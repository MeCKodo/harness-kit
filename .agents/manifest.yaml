spec: ai-harness/v0

identity:
  name: ai-harness
  summary: AI-friendly repo harness CLI —— 把工程知识变成 agent 可消费的 manifest，生成各工具文件并用门禁保证一致
  scope_in:
    - CLI 命令 init / prepare-adoption / record-adoption-audit / sync / doctor / verify / accept-contract / install-hooks / onboard / plan-checks / run-checks / evidence / record-context-review / check-loop（src/）
    - manifest schema + 生成器 + 声明式不变量执行 + 派生新鲜度 + 影响面 planner
  scope_out:
    - 目标仓库自身的业务代码（本工具只读它们的 .agents/manifest.yaml）
    - spec-driven 工作流引擎（Spec Kit / Kiro 的活，可骑在我们之上）
  downstream:
    - 任何被 harness 初始化的仓库

capabilities:
  setup:     { run: "pnpm install" }
  typecheck: { run: "pnpm typecheck", desc: "tsc --noEmit" }
  test:      { run: "pnpm test", desc: "node:test + tsx 核心单测（enforce/state/render/contracts/manifest）" }
  build:     { run: "pnpm build", desc: "esbuild 打包成 dist/harness-kit.cjs 单文件可执行（bin 入口）" }
  harness:   { run: "pnpm exec tsx src/cli.ts", desc: "跑 CLI（开发态）", example: "pnpm exec tsx src/cli.ts verify --repo ." }

contracts:
  - id: cli-interface
    kind: cli-interface
    desc: 所有公开命令及各自 flags；改动即影响所有使用者
    breaking_needs: minor
    snapshot: "node scripts/cli-interface-snapshot.mjs"
  - id: manifest-schema
    kind: other
    desc: .agents/manifest.yaml 的 schema（见 SPEC-v0.md）；删字段/改语义会破坏已初始化的仓
    breaking_needs: major
    check: "node --import tsx --test test/manifest.test.ts test/examples.test.ts"

invariants:
  - id: no-raw-console-in-commands
    rule: 命令模块统一走 util 的 ok/err/warn/info，不直接 console.log
    enforcement:
      forbid_pattern: ["console\\.log\\("]
      path_glob: ["src/commands/**"]
  - id: generated-header-present
    rule: 所有生成物顶部必须带 DO-NOT-EDIT 头（由 GEN_HEADER 保证）
    manual: true

knowledge:
  - path: knowledge/domain.md
    role: domain
    binds: ["src/cli.ts", "src/manifest.ts"]
  - path: knowledge/journal/
    role: journal

routing:
  - when: 加 / 改 CLI 命令
    read: ["src/cli.ts", "src/commands"]
    entry: ["src/cli.ts"]
    dont_assume:
      - 用户可见输出走 util 的 ok/err/warn/info（ASCII，无 emoji）
    verify: ["typecheck"]
  - when: 改 manifest schema
    read: ["src/manifest.ts", "SPEC-v0.md"]
    entry: ["src/manifest.ts"]
    dont_assume:
      - schema 改动要同步 SPEC-v0.md + examples/ 四个样板，否则 doctor 漂移
      - contract id 会成为文件名，glob 会交给 matcher；两者必须在 schema 期限制并安全编译
    verify: ["typecheck"]
  - when: 改生成模板
    read: ["src/render.ts"]
    entry: ["src/render.ts"]
    dont_assume:
      - AGENTS.md 有体量预算（150 行 / 700 词），细节下沉到 .agents/
    verify: ["typecheck"]
  - when: 改生成文件安全 / 接管迁移
    read: ["src/managed-files.ts", "src/adoption.ts", "src/commands/prepare-adoption.ts", "src/commands/record-adoption-audit.ts", "src/commands/sync.ts"]
    entry: ["src/managed-files.ts"]
    dont_assume:
      - 普通文件接管必须有原样 snapshot + 仓外 candidate + 绑定报告的 pass receipt；裸 adopt 不构成授权
      - receipt 只能证明声明顺序与候选字节未漂移，不能证明审计 Agent 独立或语义判断正确
      - 仓内 legacy snapshot 只保存将被接管的 managed entry；嵌套入口和引用文档保持原位，只进入仓外 guidance bundle
      - adoption index/snapshot 父链禁 symlink、no-follow/no-replace；index 失败时保留 append-only snapshot 供恢复，不能删掉可能已并发改写的 inode
      - 只有 CLAUDE.md -> AGENTS.md 相对软链接可保留
      - sync 只生成确定性文件，不能刷新 context review
    verify: ["test", "typecheck"]
  - when: 改知识新鲜度 / Agent 复核
    read: ["src/state.ts", "src/commands/record-context-review.ts", "SPEC-v0.md"]
    entry: ["src/state.ts"]
    dont_assume:
      - repo-root knowledge 路径不按 docs/knowledge/context 文件夹名写死
      - record-context-review 只记录 Agent 已完成分析的证据，不替代分析
    verify: ["test", "typecheck"]
  - when: 加 / 改测试
    read: ["test", "src"]
    entry: ["test"]
    dont_assume:
      - 单测用 node:test + tsx，勿引入 jest/vitest（反仪式、少依赖）
    verify: ["test", "typecheck"]

modules:
  - name: cli
    role: 命令入口与分发（commander）
    entry: ["src/cli.ts"]
    owns: ["src/cli.ts", "scripts/cli-interface-snapshot.mjs"]
    tests: ["test/cli.test.ts"]
    checks: ["test", "typecheck"]
    test_touch: required
    pitfalls:
      - 新命令记得用 guard() 包裹，统一错误退出码
      - 公开命令或 flag 改动要更新完整 help snapshot，不能只看顶层 --help
  - name: manifest
    role: manifest schema + 加载 + 校验
    entry: ["src/manifest.ts"]
    owns: ["src/manifest.ts", "SPEC-v0.md", ".agents/manifest.yaml", "examples/*/.agents/manifest.yaml"]
    tests: ["test/manifest.test.ts"]
    checks: ["test", "typecheck"]
    test_touch: required
    pitfalls:
      - contract id 必须是跨平台安全的直接文件名、ASCII case-fold 后唯一且避开系统保留名；所有执行型 glob 都要限制长度并在 schema 期编译
  - name: render
    role: manifest -> 各工具文件的生成器
    entry: ["src/render.ts"]
    owns: ["src/render.ts"]
    tests: ["test/render.test.ts"]
    checks: ["test", "typecheck"]
    test_touch: required
    must_know:
      - routing/modules 只在声明时才生成对应 .agents/*.md
    pitfalls:
      - AGENTS.md 要保持精简，别把 routing/modules 全文塞进去
  - name: enforce
    role: 声明式不变量执行（确定性，无 LLM）
    entry: ["src/enforce.ts"]
    owns: ["src/enforce.ts"]
    tests: ["test/enforce.test.ts"]
    checks: ["test", "typecheck"]
    pitfalls:
      - path_glob 是 include-only；想排除文件只能靠缩小 glob 范围
  - name: planner
    role: 纯函数影响面 planner（diff -> checks + gaps，无 IO）
    entry: ["src/planner.ts"]
    owns: ["src/planner.ts"]
    tests: ["test/planner.test.ts"]
    checks: ["test", "typecheck"]
    test_touch: required
    pitfalls:
      - 保持纯函数：不碰 git / fs / 进程，只做 glob 匹配，方便单测
  - name: git-diff
    role: 安全收集 committed / staged / unstaged / untracked 改动并生成指纹
    entry: ["src/git.ts"]
    owns: ["src/git.ts"]
    tests: ["test/git.test.ts"]
    checks: ["test", "typecheck"]
    test_touch: required
    pitfalls:
      - Git ref 必须用参数数组传给 git，禁止拼进 shell
      - SessionStart 基线必须用 exact diff，不能用 merge-base 吞掉会话内 commit
      - nested --repo 必须只返回 target 内且 target-relative 的路径，不能混入兄弟 package
      - fingerprint 必须覆盖 Git 可执行位，以及 submodule 当前 commit/脏状态，不能只 hash 普通文件内容
  - name: validation-runner
    role: plan-checks / run-checks / evidence 与持久化验收状态
    entry: ["src/commands/run-checks.ts"]
    owns: ["src/commands/plan-checks.ts", "src/commands/run-checks.ts", "src/commands/evidence.ts", "src/validation-state.ts"]
    tests: ["test/run-checks.test.ts", "test/validation-state.test.ts"]
    checks: ["test", "typecheck"]
    test_touch: required
    pitfalls:
      - run-checks 只执行可终止、无副作用的 capability；unknown/background/mutating 都必须 fail closed
      - waiver 只允许覆盖类 gap，且仅对同一 change fingerprint + gap kind + scope 生效，理由不能为空
      - evidence 读取时必须重算 fingerprint；代码变化后的旧绿灯必须 stale + 非零退出
      - 手动 evidence 的整体 valid 也要求同指纹 verifyPassed，run-checks 单独通过只算 runChecksValid
      - 无 lifecycle session 时，隐式 HEAD 的 no-change 不能证明已 commit 的任务；手动验收必须传 task-start base
  - name: agent-hooks
    role: Claude Code / Cursor / Codex 的 SessionStart + Stop 生命周期门禁
    entry: ["src/commands/hook-event.ts"]
    owns: ["src/commands/install-hooks.ts", "src/commands/stop-hooks.ts", "src/commands/hook-event.ts", "src/hook-status.ts", "src/codex-linked-hooks.ts"]
    tests: ["test/install-hooks.test.ts", "test/hook-event.test.ts", "test/codex-linked-hooks.test.ts"]
    checks: ["test", "typecheck"]
    test_touch: required
    pitfalls:
      - Claude/Codex 用 stdout JSON decision=block；Cursor 用 stdout JSON followup_message
      - stop_hook_active 不是跳过验证的理由，每次结束尝试都重新检查
      - run-checks 7 分钟 + verify 2 分钟必须小于客户端 10 分钟 hook 上限，超时要来得及返回 blocking 协议
      - Codex linked worktree 必须显式安装用户分发器 fallback；无登记 silent no-op，有登记但路径/权限/runner hash 不一致则 fail closed
      - linked worktree 要比较 canonical git-dir 与 git-common-dir，不能把同样使用 .git 文件的 submodule 误判为 linked
      - Orca 的 CODEX_HOME 是生成态；用户分发器必须写入 ~/.codex 源配置并由新终端镜像，不能补丁运行时 hooks、Orca 管理脚本或 trust 状态
      - 原生 Git hooks 可能由 linked worktrees 共享；默认拒绝共享/custom/global/foreign hooks，不能用 --force 覆盖第三方 hook
      - Agent hook runner 与客户端配置必须整组预检、事务写入；拒绝配置软链接和未知 hooks 结构，不能写到项目外或留半套配置
      - ACTIVE 只认安装器生成的精确 runner 与逐 agent/event 命令；marker 文本或不安全 HARNESS_KIT_CMD 前缀都不构成配置证据
      - ACTIVE evidence 必须绑定 SessionStart 时的 runner/client-config 指纹；合法 override 或配置变化后旧证据也只能 DEGRADED
      - Hook 配置渲染依据的旧字节必须绑定同一次事务 preflight；并发更新要失败并保留新内容
      - 用户分发器登记必须最后写入；ACTIVE 指纹只绑定 Harness managed 用户入口，不得被无关第三方用户 Hook 变化污染
  - name: managed-generation
    role: 生成文件接管、软链接边界与事务写入
    entry: ["src/managed-files.ts"]
    owns: ["src/managed-files.ts", "src/adoption.ts", "src/commands/{init,prepare-adoption,record-adoption-audit,sync}.ts"]
    tests: ["test/managed-files.test.ts", "test/adoption.test.ts"]
    checks: ["test", "typecheck"]
    test_touch: required
    pitfalls:
      - 接管授权必须在同一次 preflight 上完成，不能先 inspect 再另一次 write 留 TOCTOU 缝隙
      - audit bundle/receipt 必须在仓外且内容寻址；apply 重新渲染核对，不能把候选当任意写入源
      - init 非 force 要先统一预检全部 scaffold；legacy 文件 mode 与 guidance 的原位字节/拓扑都必须进入审计绑定
      - declared/unverified 不能命名成 verified；本地 hash 没有外部身份信任根
      - sync 不得写 .agents/.harness-state.json；语义新鲜度只由 record-context-review 推进
  - name: context-freshness
    role: 任意 repo 文档登记、authority 语义与 Agent review evidence
    entry: ["src/state.ts"]
    owns: ["src/state.ts", "src/commands/record-context-review.ts"]
    tests: ["test/state.test.ts", "test/context-review.test.ts", "test/doctor.test.ts", "test/verify.test.ts"]
    checks: ["test", "typecheck"]
    test_touch: required
    pitfalls:
      - root=repo 表示 path 从仓库根解析，不代表固定目录名，也不搬运业务文档
      - authority=derived/policy/review 都要求显式 Agent 复核；hash 只能证明之后没变，不能证明分析质量
      - 删除 binds、切换 authority 或绑定源缺失都必须让旧 review 失效，不能靠旧 hash 继续显示 current
  - name: core-gates
    role: init/sync/doctor/verify/contract/enforcement 的通用基础
    entry: ["src/commands/verify.ts"]
    owns:
      - "src/commands/{accept,doctor,verify}.ts"
      - "src/{contracts,util}.ts"
    tests: ["test/contracts.test.ts", "test/state.test.ts", "test/examples.test.ts"]
    checks: ["test", "typecheck"]
    pitfalls:
      - verify --json 对 repo-controlled matcher/文件系统异常也必须只输出一份结构化失败报告
      - accept-contract 必须先校验 manifest，基线只能写 .agents/contracts 的安全普通文件
  - name: bundled-skills
    role: onboard / check-loop 技能的定位、输出与维护
    entry: ["src/skill.ts"]
    owns: ["src/skill.ts", "src/commands/{onboard,check-loop}.ts", "skills/**"]
    tests: ["test/onboard.test.ts"]
    checks: ["test", "typecheck"]
  - name: examples
    role: 四种接入形态的可读、doctor-healthy 回归样板
    entry: ["test/examples.test.ts"]
    owns: ["examples/**"]
    tests: ["test/examples.test.ts"]
    checks: ["test", "typecheck"]
    test_touch: required
  - name: repository-assets
    role: 包元数据、生成状态、项目文档与本仓维护配置
    entry: ["package.json"]
    owns:
      - ".agents/**"
      - "AGENTS.md"
      - "CLAUDE.md"
      - "README.md"
      - "docs/**"
      - ".gitignore"
      - "package.json"
      - "pnpm-lock.yaml"
    tests: ["test/**"]
    checks: ["test", "typecheck"]
    pitfalls:
      - package 声明 Node >=18，runtime 依赖不得偷偷抬高版本下限；发布包要用真实 Node 18 跑 CLI smoke

validation:
  policies:
    test_touch_default: advisory
  required_coverage: ["src/**"]
  defaults:
    no_match: ["typecheck"]

playbooks:
  dir: playbooks/
